<!DOCTYPE html><html lang="de"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Punktekönig">
<meta name="theme-color" content="#fdeccf">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon-v6.png">
<title>Punktekönig</title>
<style>
/* ===== base.css – Struktur, iPhone-Rahmen, Animationen (designneutral) ===== */
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;
  font-family:var(--font,-apple-system,"SF Pro Text",BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif)}
html,body{margin:0;height:100%}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;
  background:radial-gradient(120% 120% at 50% 0%,#2b2b30,#0e0e10)}

/* iPhone 17 */
.phone{position:relative;width:402px;height:874px;flex:0 0 auto;background:#000;border-radius:55px;padding:11px;
  box-shadow:0 0 0 11px #1b1b1d,0 0 0 13px #2c2c2e,0 40px 90px rgba(0,0,0,.6)}
.screen{position:relative;width:100%;height:100%;border-radius:45px;overflow:hidden;background:var(--bg,#fff)}
.island{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:122px;height:35px;background:#000;border-radius:20px;z-index:200}
@media (max-width:430px){body{display:block;background:var(--bg,#fff)}.phone{width:100%;height:100dvh;border-radius:0;padding:0;box-shadow:none}.screen{border-radius:0}.island{display:none}}

#app{position:absolute;inset:0}
.view{position:absolute;inset:0;display:flex;flex-direction:column;will-change:transform,opacity}
.setup,.game{display:flex;flex-direction:column;height:100%;padding:50px 20px 22px}

/* logos */
.logo{display:inline-flex;align-items:center;justify-content:center;overflow:hidden}
.logo img{width:100%;height:100%;object-fit:contain;display:block}
.logo.nologo{font-weight:800;letter-spacing:-.5px}
.logo.nologo[data-g="flip7"]::after{content:"FLIP 7";color:#f5b301}
.logo.nologo[data-g="uno"]::after{content:"UNO";color:#ED1C24;font-style:italic}

/* setup skeleton */
.topbar{display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:7px;font-weight:700;font-size:15px}
.htitle{margin:6px 0 14px}
.games{display:flex;gap:11px;margin-bottom:12px}
.gtile{flex:1;border:none;display:flex;align-items:center;justify-content:center;padding:14px 10px;background:none}
.gtile .logo{width:100%;max-width:130px;height:50px}
.gtile.nologo,.gtile .logo.nologo{font-size:20px}
.gtile.pick{animation:pick .4s var(--spring)}
@keyframes pick{0%{transform:scale(1)}45%{transform:scale(1.07)}100%{transform:scale(1)}}
.lbl{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;opacity:.55;margin:8px 2px 8px}
.pills{display:flex;gap:7px;flex-wrap:wrap}
.pill{flex:1;min-width:64px;border:none;font-size:15px;font-weight:600;padding:11px 6px}
.pill:active{transform:scale(.93)}
.hint{font-size:12.5px;line-height:1.4;margin:9px 2px 2px;opacity:.6}
.plist{display:flex;flex-direction:column;overflow-y:auto;flex:0 1 auto}
.plist::-webkit-scrollbar{display:none}
.prow{display:flex;align-items:center;gap:11px;overflow:hidden;height:50px;transition:height .35s var(--ease),opacity .3s}
.prow.removing{height:0;opacity:0}
.prow.adding{animation:addrow .45s var(--spring)}
@keyframes addrow{from{height:0;opacity:0}to{height:50px;opacity:1}}
.dot{width:28px;height:28px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px}
.prow input{flex:1;border:none;background:none;font-size:16px;padding:14px 0;color:inherit;-webkit-user-select:text;user-select:text}
.prow input:focus{outline:none}
.del{width:26px;height:26px;border-radius:50%;border:none;font-size:16px;flex:0 0 auto;opacity:.6}
.del:active{transform:scale(.85)}
.addrow{display:flex;align-items:center;gap:11px;padding:11px 0;border:none;background:none;font-size:15px;font-weight:600}
.plus{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px}
.plist{margin-bottom:16px}
.setup{position:relative}
.vlink.corner{position:absolute;top:48px;right:18px;z-index:10}
.facts{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;margin-bottom:8px}
.facts::-webkit-scrollbar{display:none}
.fcard{flex:0 0 100%;scroll-snap-align:center;display:flex;align-items:center;gap:13px;padding:15px 16px;border-radius:16px;min-height:60px}
.fi{font-size:26px;flex:0 0 auto}
.ft{font-weight:700;font-size:14px;line-height:1.35}
.fdots{display:flex;justify-content:center;gap:6px;margin-top:10px}
.fdot{width:6px;height:6px;border-radius:50%;transition:all .3s}
.fdot.on{width:18px;border-radius:3px}
.morelink{display:block;width:100%;margin-top:10px;padding:9px;border:none;background:none;font-family:inherit;font-size:14px;font-weight:700}
.morelink:active{opacity:.5}
.dellink{display:block;margin:26px auto 6px;border:none;background:none;font-family:inherit;font-size:12.5px;padding:8px 12px;opacity:.4}
.dellink:active{opacity:.8}
.htitle-screen{font-size:30px!important;white-space:normal!important;margin-bottom:14px}
.hback{align-self:flex-start;margin-bottom:10px}
.vscroll{flex:1;overflow-y:auto;margin:0 -4px;padding:0 4px}
.vscroll::-webkit-scrollbar{display:none}
.hlist{display:flex;flex-direction:column;gap:7px}
.catempty{font-size:14px;opacity:.55;margin:6px 2px 2px;text-align:center;padding:18px 0}
.histgames{margin-bottom:14px}
.histgames .gtile{justify-content:space-between;padding:11px 16px}
.histgames .gtile .logo{width:auto;max-width:92px;height:28px}
.histgames .gtile:not(.on){opacity:.5}
.gcount{font-weight:900;font-size:19px;flex:0 0 auto}
.medals{display:flex;flex-direction:column;gap:8px}
.med{display:flex;align-items:center;gap:12px;padding:11px 15px;border-radius:14px}
.med .mi{font-size:23px;width:28px;text-align:center;flex:0 0 auto}
.med .mn{flex:1;min-width:0;font-weight:900;font-size:17px}
.med .mn small{display:block;font-weight:600;font-size:11px;opacity:.55}
.med .mv{font-weight:900;font-size:20px;flex:0 0 auto}
.start{margin-top:auto;border:none;padding:16px;font-size:18px;font-weight:700}
.start:active{transform:scale(.97)}

/* game skeleton */
.ghead{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.gleft{display:flex;align-items:center;flex:0 0 auto}
.gleft .logo{width:58px;height:38px}
.gtarget{flex:1;text-align:center;font-size:13px;font-weight:700;opacity:.8;white-space:nowrap}
.roundtag{display:inline-block;font-size:12.5px;font-weight:700;padding:6px 11px;white-space:nowrap;flex:0 0 auto}
.boardwrap{flex:1;overflow:auto}
.boardwrap::-webkit-scrollbar{display:none}
.board{width:100%;border-collapse:collapse}
.board th,.board td{text-align:center;padding:0}
.board thead th{padding:9px 3px;position:sticky;top:0;z-index:3}
.board th .pdot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;transition:transform .3s var(--spring)}
.board th.lead .pdot{transform:scale(1.7)}
.board .rh{width:34px;font-size:12px;opacity:.5;font-weight:700}
.board tbody input{width:100%;border:none;background:none;text-align:center;font-size:17px;padding:13px 2px;color:inherit;-webkit-user-select:text;user-select:text}
.board tbody input:focus{outline:none}
.board tfoot td{padding:13px 3px;font-weight:800;position:relative}
.board tfoot .tot{font-variant-numeric:tabular-nums}
.crown{position:absolute;top:-8px;left:50%;transform:translateX(-50%) translateY(4px) scale(.5);font-size:13px;opacity:0;transition:all .4s var(--spring)}
.board tfoot td.lead .crown{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
.finish{margin-top:12px;border:none;padding:16px;font-size:17px;font-weight:700}
.finish:active{transform:scale(.97)}

.toast{position:absolute;left:50%;bottom:90px;transform:translateX(-50%) translateY(16px);font-size:14px;font-weight:600;padding:10px 18px;border-radius:30px;opacity:0;transition:all .4s var(--spring);z-index:80;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* winner */
.overlay{position:absolute;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(0,0,0,0);transition:background .35s var(--ease)}
.overlay.show{background:rgba(0,0,0,.45);backdrop-filter:blur(7px)}
.sheet{border-radius:28px;padding:32px 24px 22px;width:100%;text-align:center;transform:scale(.8) translateY(30px);opacity:0;transition:transform .5s var(--spring),opacity .35s}
.overlay.show .sheet{transform:scale(1) translateY(0);opacity:1}
.bigcrown{font-size:60px;display:inline-block;animation:pop .7s var(--spring) .15s both}
@keyframes pop{0%{transform:scale(0) rotate(-30deg)}100%{transform:scale(1) rotate(0)}}
.wlabel{font-size:14px;opacity:.55;font-weight:600;margin-top:4px}
.wname{font-size:32px;font-weight:800;margin:2px 0}
.wpts{font-size:14px;opacity:.55;margin-bottom:18px}
.rank{display:flex;align-items:center;gap:11px;padding:11px 15px;border-radius:13px;margin-bottom:7px;opacity:0;transform:translateX(-14px);animation:slidein .45s var(--ease) forwards}
.rpos{font-weight:700;opacity:.5;width:15px}
.rname{flex:1;text-align:left;font-weight:600}
.rval{font-weight:800}
@keyframes slidein{to{opacity:1;transform:translateX(0)}}
.wbtns{display:flex;gap:9px;margin-top:16px}
.wbtn{flex:1;border:none;padding:14px;font-size:16px;font-weight:700;border-radius:14px}
.confetti{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.confetti i{position:absolute;top:-12px;width:9px;height:14px;border-radius:2px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(900px) rotate(720deg);opacity:.9}}

:root{--spring:cubic-bezier(.34,1.56,.64,1);--ease:cubic-bezier(.22,.61,.36,1)}

/* ===== Pop-Theme · Farbwelt wechselt je Spiel ===== */
/* Flip 7 (Standard) */
:root{
  --grad:linear-gradient(170deg,#fffaf0,#fdeccf);
  --ink:#21366e; --accent:#ff3b5c; --accent-ink:#fff;
  --sel:#f5b301; --sel-ink:#21366e;
  --card:#ffffff; --divider:#efe6d0; --outline:#21366e; --shadowc:rgba(33,54,110,.9);
  --lead:#2bb673; --tag:#f5b301; --tag-ink:#21366e;
  --sheet:#fffaf0; --rankbg:#f4ead4;
}
/* Uno · Variante C (Rot) */
body[data-game="uno"]{
  --grad:linear-gradient(170deg,#d8161d,#7e0a10);
  --ink:#ffffff; --accent:#FFD60A; --accent-ink:#7e0a10;
  --sel:#ffffff; --sel-ink:#d8161d;
  --card:rgba(255,255,255,.10); --divider:rgba(255,255,255,.20); --outline:rgba(0,0,0,.22); --shadowc:rgba(0,0,0,.35);
  --lead:#FFD60A; --tag:#FFD60A; --tag-ink:#7e0a10;
  --sheet:#b3121a; --rankbg:rgba(255,255,255,.14);
}
body,.screen{color:var(--ink)}
.screen{background:var(--grad);transition:background .5s ease}

.brand{color:var(--accent);font-weight:800}
.htitle{font-size:19px;font-weight:900;letter-spacing:-.3px;color:var(--ink);white-space:nowrap}

.gtile{background:var(--card);border:2px solid var(--outline);border-radius:18px;
  box-shadow:3px 3px 0 var(--shadowc);transition:transform .2s var(--spring),background .3s,box-shadow .2s}
.gtile.on{background:var(--sel);transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--shadowc)}
.gtile.on .gname{color:var(--sel-ink)}
.gname{font-size:13px;font-weight:800;color:var(--ink)}

.pill{background:var(--card);border:1.5px solid var(--outline);border-radius:12px;color:var(--ink);font-weight:800}
.pill.on{background:var(--accent);color:var(--accent-ink);border-color:var(--outline)}
.hint{opacity:.65}

.plist{background:var(--card);border:2px solid var(--outline);border-radius:16px;padding:0 14px;box-shadow:3px 3px 0 var(--shadowc)}
.prow{border-bottom:1px solid var(--divider)}.prow:last-of-type{border-bottom:none}
.del{background:var(--divider);color:var(--accent)}.del:active{background:var(--accent);color:var(--accent-ink)}
.addrow{color:var(--accent);font-weight:800}.plus{border:1.5px dashed var(--accent);color:var(--accent)}

.start,.finish{background:var(--accent);color:var(--accent-ink);border:2px solid var(--outline);border-radius:15px;
  box-shadow:4px 4px 0 var(--shadowc);font-weight:800}
.start:active,.finish:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--shadowc)}

.neu{background:var(--card);border:1.5px solid var(--outline);border-radius:11px;font-weight:800;color:var(--ink)}
.roundtag{background:var(--tag);color:var(--tag-ink);border:1.5px solid var(--outline);border-radius:20px;font-weight:800}

.boardwrap{background:var(--card);border:2px solid var(--outline);border-radius:16px;padding:4px 6px;box-shadow:3px 3px 0 var(--shadowc)}
.board thead th{background:var(--card);font-weight:800;color:var(--ink);border-bottom:1px solid var(--divider)}
.board th.lead .pn{color:var(--lead)}
.board tbody tr{border-bottom:1px solid var(--divider)}
.board tbody input{color:var(--ink)}.board tbody input::placeholder{color:var(--divider)}
.board tfoot td{border-top:1px solid var(--divider);font-size:19px;font-weight:900;color:var(--ink)}
.board tfoot td.lead{color:var(--lead)}

.toast{background:var(--ink);color:var(--card);font-weight:700}

.sheet{background:var(--sheet);border:2px solid var(--outline);box-shadow:5px 5px 0 var(--shadowc)}
.wlabel{color:var(--ink);opacity:.6}.wname{color:var(--ink)}.wpts{color:var(--ink);opacity:.6}
.rank{background:var(--rankbg);border:1.5px solid var(--divider)}.rname,.rval,.rpos{color:var(--ink)}
.wbtn{background:var(--accent);color:var(--accent-ink);border:2px solid var(--outline)}
.wbtn.ghost{background:var(--card);color:var(--ink)}

/* Historie */
.vlink{border:1.5px solid var(--outline);background:var(--card);color:var(--ink);font-family:inherit;font-weight:800;font-size:14px;padding:8px 13px;border-radius:12px}
.vlink:active{transform:scale(.95)}
.vlink.corner{border:none;background:none;color:var(--ink);opacity:.55;padding:6px;line-height:0}
.vlink.corner svg{display:block}
.catempty{color:var(--ink)}
.gcount{color:var(--ink)}
.histgames .gtile.on .gcount{color:var(--sel-ink)}
.med{background:var(--card);border:1.5px solid var(--divider);color:var(--ink)}
.med.first{border:2px solid var(--outline);box-shadow:2px 2px 0 var(--shadowc)}
.med .mv{color:var(--lead)}
.fcard{background:var(--card);border:1.5px solid var(--divider);color:var(--ink)}
.fdot{background:var(--divider)}
.fdot.on{background:var(--accent)}
.morelink{color:var(--accent)}
.dellink{color:var(--ink);text-decoration:underline}
.hcard{display:flex;align-items:center;gap:11px;background:var(--card);border:1.5px solid var(--divider);border-radius:14px;padding:11px 14px}
.hdot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;flex:0 0 auto}
.hmid{flex:1;min-width:0}
.hwin{font-weight:800;color:var(--ink)}
.hsub{font-size:12px;color:var(--ink);opacity:.55;margin-top:1px}
.hscore{font-weight:900;font-size:18px;color:var(--ink)}
.ghostbtn{background:var(--card);color:var(--accent);border:1.5px solid var(--outline);box-shadow:none;margin-top:12px}
.ghostbtn:active{transform:scale(.97)}

</style></head>

(function(){
const COLORS=['#FF9F0A','#FF375F','#BF5AF2','#0A84FF','#30D158','#64D2FF','#FF6482','#FFD60A'];
const DEFAULTS=['Theo','Greta','Mama','Papa'];

  flip7:{label:'Punkte-Ziel',opts:[{v:100,t:'100'},{v:150,t:'150'},{v:200,t:'200'},{v:250,t:'250'}],def:200},
  uno:{label:'Runden-Ziel',opts:[{v:4,t:'4'},{v:8,t:'8'},{v:12,t:'12'},{v:null,t:'Kein Ziel'}],def:null}
};
const KEY='punkte_'+(document.body.dataset.store||'app');

const Store={load(){try{return JSON.parse(localStorage.getItem(KEY))}catch(e){return null}},save(){localStorage.setItem(KEY,JSON.stringify(game))},clear(){localStorage.removeItem(KEY)}};
const HKEY='punkte_history';
const Hist={
  load(){try{return JSON.parse(localStorage.getItem(HKEY))||[]}catch(e){return []}},
  save(a){localStorage.setItem(HKEY,JSON.stringify(a))},
  upsert(rec){const a=Hist.load();const i=a.findIndex(x=>x.id===rec.id);if(i>=0)a[i]=rec;else a.unshift(rec);Hist.save(a)},
  clear(){localStorage.removeItem(HKEY)}

function buzz(ms){try{navigator.vibrate&&navigator.vibrate(ms)}catch(e){}}
/* ================= HISTORIE ================= */
function colorFor(n){let x=0;for(const ch of String(n))x=(x*31+ch.charCodeAt(0))>>>0;return COLORS[x%COLORS.length]}
function statsFor(filter){
  const games=Hist.load().filter(r=>filter?r.game===filter:true);
  const wins={},parts={},players=new Set();

function rankInGame(r){
  const arr=(r.players||[]).map((n,i)=>({n,s:parseInt(r.scores[i])||0}));

// Priorität je Fakt-Kategorie (höher = interessanter / häufiger gezogen)
const FACT_PRIO={streak:3.5,milestone:4,king:3,never:2.5,quote:2,highscore:2,closest:2,widest:1.8,fav:1.6,second:1.6,pech:1.6,vielspieler:1.4,long:1.2,short:1.2};
function buildFacts(h){
  const F=[]; if(!h.length) return F;
  const add=(k,i,t)=>F.push({k,i,t});
  const sorted=[...h].sort((a,b)=>b.ts-a.ts);
  let streak=1; for(let i=1;i<sorted.length;i++){if(sorted[i].winner===sorted[0].winner)streak++;else break;}
  if(streak>=2) add('streak','🔥',`${sorted[0].winner} hat die letzten ${streak} Spiele in Folge gewonnen.`);
  const wins={},parts={},seconds={},lasts={},players=new Set();
  h.forEach(r=>{const rk=rankInGame(r);rk.forEach(p=>{parts[p.n]=(parts[p.n]||0)+1;players.add(p.n)});wins[r.winner]=(wins[r.winner]||0)+1;if(rk.length>=2){seconds[rk[1].n]=(seconds[rk[1].n]||0)+1;const last=rk[rk.length-1].n;lasts[last]=(lasts[last]||0)+1;}});
  const unoN=h.filter(r=>r.game==='uno').length, flipN=h.filter(r=>r.game==='flip7').length;
  if(unoN!==flipN){const f=unoN>flipN?['Uno',unoN,flipN]:['Flip 7',flipN,unoN];add('fav','❤️',`Euer Lieblingsspiel: ${f[0]} (${f[1]}:${f[2]}).`);}
  if(h.length%10===0) add('milestone','🎉',`Euer ${h.length}. Spiel — Glückwunsch!`);
  const wk={},weekAgo=Date.now()-7*864e5; h.filter(r=>r.ts>=weekAgo).forEach(r=>wk[r.winner]=(wk[r.winner]||0)+1);
  let king=null; Object.keys(wk).forEach(n=>{if(!king||wk[n]>king.c)king={n,c:wk[n]}}); if(king&&king.c>=2)add('king','👑',`König der Woche: ${king.n} (${king.c} Siege).`);
  let bestQ=null; Object.keys(parts).forEach(n=>{if(parts[n]>=3){const q=(wins[n]||0)/parts[n];if(!bestQ||q>bestQ.q)bestQ={n,q};}}); if(bestQ&&bestQ.q>0)add('quote','📊',`Beste Siegquote: ${bestQ.n} (${Math.round(bestQ.q*100)} %).`);
  let vp=null; Object.keys(parts).forEach(n=>{if(!vp||parts[n]>vp.c)vp={n,c:parts[n]}}); if(vp&&vp.c>=4)add('vielspieler','🪑',`Dauergast: ${vp.n} war bei ${vp.c} Partien dabei.`);
  let sec=null; Object.keys(seconds).forEach(n=>{if(!sec||seconds[n]>sec.c)sec={n,c:seconds[n]}}); if(sec&&sec.c>=2&&(seconds[sec.n]>(wins[sec.n]||0)))add('second','🥈',`Ewiger Zweiter: ${sec.n} (${sec.c}× Platz 2).`);
  let pv=null; Object.keys(lasts).forEach(n=>{if(!pv||lasts[n]>pv.c)pv={n,c:lasts[n]}}); if(pv&&pv.c>=2)add('pech','🍀',`Pechvogel: ${pv.n} wurde ${pv.c}× Letzter.`);
  let closest=null,widest=null; h.forEach(r=>{const rk=rankInGame(r);if(rk.length>=2){const m=Math.abs(rk[0].s-rk[1].s);if(closest===null||m<closest.m)closest={m,n:r.winner};if(widest===null||m>widest.m)widest={m,n:r.winner};}});
  if(closest)add('closest','😬',`Knappster Sieg: nur ${closest.m} Punkte Abstand (${closest.n}).`);
  if(widest&&closest&&widest.m!==closest.m)add('widest','💥',`Größter Vorsprung: ${widest.m} Punkte (${widest.n}).`);
  const flips=h.filter(r=>r.game==='flip7'); if(flips.length){let hs=null;flips.forEach(r=>{const ws=parseInt(r.scores[r.players.indexOf(r.winner)])||0;if(hs===null||ws>hs.s)hs={s:ws,n:r.winner}});if(hs)add('highscore','🚀',`Höchster Siegscore: ${hs.n} mit ${hs.s} (Flip 7).`);}
  let lo=null,sh=null; h.forEach(r=>{if(r.rounds>0){if(!lo||r.rounds>lo.r)lo={r:r.rounds};if(!sh||r.rounds<sh.r)sh={r:r.rounds};}});
  if(lo)add('long','🐢',`Längstes Spiel: ${lo.r} Runden.`); if(sh&&lo&&sh.r!==lo.r)add('short','⚡',`Kürzestes Spiel: ${sh.r} Runden.`);
  if(unoN>0&&flipN>0)[...players].forEach(n=>{const u=h.some(r=>r.game==='uno'&&r.players.includes(n)),fl=h.some(r=>r.game==='flip7'&&r.players.includes(n));if(fl&&!u)add('never','🚫',`${n} spielt nie bei Uno mit.`);else if(u&&!fl)add('never','🚫',`${n} spielt nie bei Flip 7 mit.`);});
  return F;
}
// Wählt rotierend bis zu 3 Fakten: Priorität + Zufall, kürzlich Gezeigtes abgewertet
function pickFacts(all,n){
  if(all.length<=n) return all.slice();
  let seen=[]; try{seen=JSON.parse(localStorage.getItem('punkte_factseen'))||[]}catch(e){}
  const scored=all.map(f=>{
    const base=FACT_PRIO[f.k]||1;
    const rec=seen.indexOf(f.k);                 // -1 = lange nicht gezeigt
    const penalty=rec===-1?1:0.12+0.1*(seen.length-1-rec); // je frischer gezeigt, desto kleiner
    return {f,score:base*penalty*(0.6+Math.random())};
  }).sort((a,b)=>b.score-a.score);
  const pick=scored.slice(0,n).map(x=>x.f);
  const newSeen=[...seen.filter(k=>!pick.some(f=>f.k===k)),...pick.map(f=>f.k)].slice(-8);
  try{localStorage.setItem('punkte_factseen',JSON.stringify(newSeen))}catch(e){}
  return pick;
}

    <div class="wbtns"><button class="wbtn ghost" id="closeW">Weiter</button><button class="wbtn" id="newW">Neues Spiel</button></div>
   </div></div>`;
  const o=ov.querySelector('#overlay');requestAnimationFrame(()=>o.classList.add('show'));confetti(ov.querySelector('#conf'),COLORS);buzz([10,40,10,40,30]);
  ov.querySelector('#closeW').onclick=()=>{o.classList.remove('show');setTimeout(()=>ov.innerHTML='',350)};
  ov.querySelector('#newW').onclick=()=>{Store.clear();game=null;draft={game:draft.game,players:[...DEFAULTS],target:TARGETS[draft.game].def};ov.innerHTML='';renderSetup(-1)};
}
function confetti(box,cols){for(let i=0;i<70;i++){const c=document.createElement('i');c.style.left=Math.random()*100+'%';c.style.background=cols[i%cols.length];c.style.animationDuration=(1.6+Math.random()*1.4)+'s';c.style.animationDelay=(Math.random()*.5)+'s';c.style.transform=`scale(${.6+Math.random()})`;box.appendChild(c)}setTimeout(()=>box.innerHTML='',3500)}

if(game)renderGame();else renderSetup();
})();

if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js')})}
</script>
